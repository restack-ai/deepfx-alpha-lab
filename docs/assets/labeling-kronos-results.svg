<svg xmlns="http://www.w3.org/2000/svg" width="960" height="390" viewBox="0 0 960 390" role="img" aria-labelledby="title desc">
  <title id="title">Kronos labeler dataset and baseline results</title>
  <desc id="desc">Comparison of four-symbol and seven-symbol Kronos labeler datasets after running statistical and frozen Kronos embedding baselines.</desc>
  <rect width="960" height="390" fill="#ffffff"/>
  <text x="40" y="42" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#1f2937">Kronos Labeler Results After Labeling Fix</text>
  <text x="40" y="68" font-family="Arial, sans-serif" font-size="13" fill="#4b5563">M15 events, M1 OHLC path, pt/sl 0.5/0.5, 8h vertical barrier, sl_first ambiguity policy</text>

  <text x="70" y="112" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#111827">Dataset rows</text>
  <line x1="70" y1="300" x2="390" y2="300" stroke="#d1d5db"/>
  <line x1="70" y1="225" x2="390" y2="225" stroke="#e5e7eb"/>
  <line x1="70" y1="150" x2="390" y2="150" stroke="#e5e7eb"/>
  <text x="42" y="304" font-family="Arial, sans-serif" font-size="11" fill="#6b7280">0</text>
  <text x="31" y="229" font-family="Arial, sans-serif" font-size="11" fill="#6b7280">1000</text>
  <text x="31" y="154" font-family="Arial, sans-serif" font-size="11" fill="#6b7280">2000</text>
  <rect x="135" y="221" width="70" height="79" rx="4" fill="#2563eb"/>
  <rect x="260" y="157" width="70" height="143" rx="4" fill="#059669"/>
  <text x="139" y="213" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#1f2937">1056</text>
  <text x="264" y="149" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#1f2937">1904</text>
  <text x="126" y="326" font-family="Arial, sans-serif" font-size="12" fill="#374151">4 symbols</text>
  <text x="251" y="326" font-family="Arial, sans-serif" font-size="12" fill="#374151">7 symbols</text>

  <text x="500" y="112" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#111827">Test accuracy by embedding</text>
  <line x1="500" y1="300" x2="900" y2="300" stroke="#d1d5db"/>
  <line x1="500" y1="225" x2="900" y2="225" stroke="#e5e7eb"/>
  <line x1="500" y1="150" x2="900" y2="150" stroke="#e5e7eb"/>
  <text x="464" y="304" font-family="Arial, sans-serif" font-size="11" fill="#6b7280">0.40</text>
  <text x="464" y="229" font-family="Arial, sans-serif" font-size="11" fill="#6b7280">0.50</text>
  <text x="464" y="154" font-family="Arial, sans-serif" font-size="11" fill="#6b7280">0.60</text>

  <rect x="555" y="238" width="28" height="62" rx="3" fill="#cbd5e1"/>
  <rect x="591" y="217" width="28" height="83" rx="3" fill="#60a5fa"/>
  <rect x="627" y="200" width="28" height="100" rx="3" fill="#2563eb"/>
  <text x="608" y="191" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#1f2937">Kronos +5.1pp</text>
  <text x="563" y="326" font-family="Arial, sans-serif" font-size="12" fill="#374151">4 symbols</text>

  <rect x="745" y="253" width="28" height="47" rx="3" fill="#cbd5e1"/>
  <rect x="781" y="201" width="28" height="99" rx="3" fill="#86efac"/>
  <rect x="817" y="201" width="28" height="99" rx="3" fill="#059669"/>
  <text x="774" y="191" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#1f2937">both +6.8pp</text>
  <text x="755" y="326" font-family="Arial, sans-serif" font-size="12" fill="#374151">7 symbols</text>

  <rect x="510" y="350" width="12" height="12" fill="#cbd5e1"/>
  <text x="528" y="360" font-family="Arial, sans-serif" font-size="12" fill="#4b5563">majority</text>
  <rect x="595" y="350" width="12" height="12" fill="#60a5fa"/>
  <text x="613" y="360" font-family="Arial, sans-serif" font-size="12" fill="#4b5563">statistical RF</text>
  <rect x="710" y="350" width="12" height="12" fill="#2563eb"/>
  <text x="728" y="360" font-family="Arial, sans-serif" font-size="12" fill="#4b5563">Kronos RF</text>
